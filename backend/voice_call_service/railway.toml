[build]
builder = "RAILPACK"
watchPatterns = ["/backend/voice_call_service/**"]
buildCommand = "python -m pip install --upgrade uv && uv sync --frozen --no-dev"

[deploy]
startCommand = "sh -c '.venv/bin/uvicorn app.main:app --host 0.0.0.0 --port ${PORT}'"
healthcheckPath = "/healthz"
healthcheckTimeout = 100
