x-backend-service: &backend-service
  build:
    context: .
    dockerfile: Dockerfile
  env_file:
    - ${BACKEND_ENV_FILE:-.env}
  environment:
    APP_ENV: development
    APP_HOST: 0.0.0.0
    APP_PORT: 8000
    PYTHONUNBUFFERED: "1"
  restart: unless-stopped

services:
  api:
    <<: *backend-service
    command:
      [".venv/bin/uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"

  voice-worker:
    <<: *backend-service
    command: >
      .venv/bin/python -m voice_agent_worker connect --room
      ${VOICE_AGENT_CONNECT_ROOM:-canvas:demo-canvas}

  ai-agent:
    build:
      context: ./ai_agent_service
      dockerfile: Dockerfile
    env_file:
      - ${BACKEND_ENV_FILE:-.env}
    ports:
      - "3001:3001"
    restart: unless-stopped
